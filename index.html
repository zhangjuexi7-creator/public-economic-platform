<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>公共经济学 · 互动教学平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f4f7fb;
            padding: 32px 28px;
            min-height: 100vh;
        }

        .app {
            max-width: 1440px;
            margin: 0 auto;
        }

        body, button, input, textarea, select, .card-body, .role-badge {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        .login-overlay, .forgot-overlay, .register-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 35, 48, 0.86);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card, .forgot-card, .register-card {
            background: #ffffff;
            border-radius: 36px;
            padding: 40px 44px;
            width: 90%;
            max-width: 460px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2);
            text-align: center;
            border-top: 5px solid #2c5f7a;
        }

        .login-card h2, .forgot-card h2, .register-card h2 {
            color: #1e3b4a;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin-bottom: 32px;
            font-size: 1.85rem;
        }

        .login-card input, .forgot-card input, .register-card input {
            width: 100%;
            margin-bottom: 24px;
            padding: 14px 20px;
            border-radius: 48px;
            border: 1px solid #cfdfe8;
            font-size: 0.95rem;
            background: #ffffff;
            transition: 0.2s;
        }

        .login-card input:focus, .forgot-card input:focus, .register-card input:focus {
            outline: none;
            border-color: #2c5f7a;
            box-shadow: 0 0 0 3px rgba(44, 95, 122, 0.12);
        }

        .login-card button, .forgot-card button, .register-card button {
            width: 100%;
            background: #2c5f7a;
            padding: 12px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 48px;
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .login-card button:hover, .forgot-card button:hover, .register-card button:hover {
            background: #1f4a60;
            transform: translateY(-1px);
        }

        .error-msg {
            color: #c0392b;
            font-size: 0.8rem;
            margin-top: 14px;
        }

        .success-msg {
            color: #2c5f7a;
            font-size: 0.8rem;
        }

        .link-btn {
            background: none;
            color: #2c5f7a;
            text-decoration: underline;
            padding: 8px;
            font-size: 0.8rem;
            margin-top: 12px;
            box-shadow: none;
            width: auto;
        }

        .link-btn:hover {
            background: none;
            transform: none;
            color: #124e66;
        }

        .demo-note {
            margin-top: 24px;
            background: #fef7e0;
            padding: 14px 18px;
            border-radius: 28px;
            font-size: 0.75rem;
            color: #6b7b8c;
            border-left: 4px solid #e6b450;
            text-align: left;
            line-height: 1.5;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 10px 32px;
            margin-bottom: 40px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2edf2;
            flex-wrap: wrap;
            gap: 12px;
        }

        .role-badge {
            background: #eef3f7;
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: 550;
            color: #1e3b4a;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: #dce6ec;
            color: #2c5f7a;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #cbdae2;
        }

        .change-pwd-btn {
            background: #e6b450;
            color: #2c3e50;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            border: 1px solid #e2edf2;
            display: flex;
            flex-direction: column;
            height: fit-content;
        }

        .card-header {
            background: #f9fbfd;
            padding: 20px 24px;
            border-bottom: 2px solid #e9f0f4;
        }

        .card-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e3b4a;
            letter-spacing: -0.2px;
        }

        .card-body {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-weight: 600;
            color: #2c5f7a;
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #d6e3ea;
            background: #ffffff;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2c5f7a;
            box-shadow: 0 0 0 3px rgba(44, 95, 122, 0.08);
        }

        button {
            background: #2c5f7a;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        button:hover {
            background: #1f4a60;
            transform: translateY(-1px);
        }

        .item-list {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .qa-item, .forum-item, .assignment-item, .resource-item {
            background: #fefefe;
            border-radius: 24px;
            padding: 18px 20px;
            border: 1px solid #eef3f7;
            border-left: 5px solid #2c5f7a;
            transition: all 0.1s;
            line-height: 1.45;
        }

        .question-title {
            font-weight: 700;
            font-size: 1rem;
            color: #1e3b4a;
            margin-bottom: 8px;
        }

        .answer-block {
            background: #f9fbfe;
            border-radius: 20px;
            padding: 12px 16px;
            margin: 12px 0 8px 0;
            border: 1px solid #e9f0f4;
        }

        .info-meta {
            font-size: 0.7rem;
            color: #7b8c9e;
            margin-top: 8px;
        }

        .teacher-reply {
            background: #fef7e0;
            margin-top: 14px;
            padding: 10px 16px;
            border-radius: 20px;
            border-left: 3px solid #e6b450;
            font-size: 0.85rem;
        }

        .empty-msg {
            text-align: center;
            padding: 32px 12px;
            color: #98abb9;
            font-size: 0.85rem;
        }

        .file-tag {
            background: #eef2f8;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            margin: 10px 0;
            color: #2c5f7a;
        }

        .feedback-area {
            background: #fafcfd;
            padding: 14px;
            border-radius: 20px;
            margin-top: 14px;
            border: 1px solid #e9f0f4;
        }

        .upload-area {
            background: #f9fbfe;
            border-radius: 24px;
            padding: 16px;
            border: 1px dashed #cbdae2;
            margin-top: 8px;
        }

        .resource-item a {
            color: #2c5f7a;
            text-decoration: none;
            font-weight: 500;
        }
        .resource-item a:hover {
            text-decoration: underline;
        }

        @media (max-width: 1200px) {
            .modules-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
        }
        @media (max-width: 760px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
<div class="app" id="appRoot"></div>

<script>
    // ========= Supabase 配置 =========
    const SUPABASE_URL = 'https://zckawtdxjqvfwpttswk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3jCeOkprt0dSQGZ64azBCA_mDSHF4xX';

    // 简单的 fetch 封装
    async function supabaseFetch(path, options = {}) {
        const url = `${SUPABASE_URL}/rest/v1${path}`;
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            ...options.headers
        };
        const response = await fetch(url, { ...options, headers });
        if (!response.ok) {
            throw new Error(`API error: ${response.status}`);
        }
        return response.json();
    }

    // ========= 数据模型 =========
    let appData = {
        questions: [],
        forumPosts: [],
        assignments: [],
        students: [],
        courseMaterials: []
    };

    let currentUser = null;
    let dataLoaded = false;

    // 从 Supabase 加载所有数据
    async function loadAllData() {
        try {
            const [questions, forumPosts, assignments, students, materials] = await Promise.all([
                supabaseFetch('/questions?order=date.desc'),
                supabaseFetch('/forum_posts?order=submitted_at.desc'),
                supabaseFetch('/assignments?order=submitted_at.desc'),
                supabaseFetch('/students'),
                supabaseFetch('/course_materials?order=upload_date.desc')
            ]);
            appData.questions = questions || [];
            appData.forumPosts = forumPosts || [];
            appData.assignments = assignments || [];
            appData.students = students || [];
            appData.courseMaterials = materials || [];
            
            if (appData.students.length === 0) {
                // 初始化默认学生
                const defaultStudents = [
                    { full_id: "3240100001", password: "0001", security: "0001", name: "张明" },
                    { full_id: "3240100002", password: "0002", security: "0002", name: "李芳" },
                    { full_id: "3240100003", password: "0003", security: "0003", name: "王磊" },
                    { full_id: "3240100004", password: "0004", security: "0004", name: "赵雪" }
                ];
                for (const s of defaultStudents) {
                    await supabaseFetch('/students', {
                        method: 'POST',
                        body: JSON.stringify(s)
                    }).catch(() => {});
                }
                appData.students = defaultStudents;
            }
            dataLoaded = true;
        } catch (e) {
            console.error("加载数据失败:", e);
            // 降级使用默认数据
            appData.students = [
                { full_id: "3240100001", password: "0001", security: "0001", name: "张明" },
                { full_id: "3240100002", password: "0002", security: "0002", name: "李芳" },
                { full_id: "3240100003", password: "0003", security: "0003", name: "王磊" },
                { full_id: "3240100004", password: "0004", security: "0004", name: "赵雪" }
            ];
            dataLoaded = true;
        }
    }

    function getMaskedStudentId(fullId) {
        if (!fullId) return "????";
        const str = String(fullId);
        return str.length >= 4 ? str.slice(-4) : str;
    }

    // 辅助函数
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function readFileAsBase64(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }

    // ========= 业务函数 =========
    async function registerStudent(fullId, password, name) {
        if (!fullId || fullId === "3240100000") return { success: false, msg: "无效学号" };
        if (fullId.length < 4) return { success: false, msg: "学号至少4位" };
        if (!password || password.length < 4) return { success: false, msg: "密码≥4位" };
        if (!name.trim()) return { success: false, msg: "请填写姓名" };
        const exist = appData.students.find(s => s.full_id === fullId);
        if (exist) return { success: false, msg: "学号已存在" };
        const security = fullId.slice(-4);
        const newStudent = { full_id: fullId, password, security, name: name.trim() };
        try {
            await supabaseFetch('/students', { method: 'POST', body: JSON.stringify(newStudent) });
            appData.students.push(newStudent);
            return { success: true, msg: "注册成功！请登录" };
        } catch(e) {
            return { success: false, msg: "注册失败，请重试" };
        }
    }

    async function addQuestion(questionText, questionType, blankAnswerText) {
        if (!questionText.trim()) return;
        const newQ = {
            id: Date.now() + "_q",
            text: questionText.trim(),
            type: questionType,
            blank_answer: questionType === 'blank' ? (blankAnswerText?.trim() || '') : null,
            date: new Date().toISOString()
        };
        await supabaseFetch('/questions', { method: 'POST', body: JSON.stringify(newQ) });
        appData.questions.unshift(newQ);
        renderMainApp();
    }

    async function deleteQuestion(qid) {
        await supabaseFetch(`/questions?id=eq.${qid}`, { method: 'DELETE' });
        appData.questions = appData.questions.filter(q => q.id !== qid);
        renderMainApp();
    }

    async function addStudentAnswer(qid, ans, mask, fullId) {
        if (!ans?.trim()) return;
        const newAnswer = {
            id: Date.now() + "_a",
            question_id: qid,
            content: ans.trim(),
            student_full_id: fullId,
            student_id_mask: mask,
            date: new Date().toISOString()
        };
        await supabaseFetch('/answers', { method: 'POST', body: JSON.stringify(newAnswer) });
        const q = appData.questions.find(q => q.id === qid);
        if (q) {
            const idx = (q.answers || []).findIndex(a => a.student_full_id === fullId);
            if (idx !== -1) q.answers[idx] = newAnswer;
            else q.answers = [...(q.answers || []), newAnswer];
        }
        renderMainApp();
    }

    async function addForumPost(type, title, content, mask) {
        if (!title.trim() || !content.trim()) return;
        const newPost = {
            id: Date.now() + "_post",
            type, title: title.trim(), content: content.trim(),
            teacher_reply: "", submitted_at: new Date().toISOString(), student_id_mask: mask
        };
        await supabaseFetch('/forum_posts', { method: 'POST', body: JSON.stringify(newPost) });
        appData.forumPosts.unshift(newPost);
        renderMainApp();
    }

    async function teacherReplyToForum(pid, reply) {
        const p = appData.forumPosts.find(p => p.id === pid);
        if (p && p.type === 'question') {
            p.teacher_reply = reply?.trim() || "";
            await supabaseFetch(`/forum_posts?id=eq.${pid}`, { 
                method: 'PATCH', 
                body: JSON.stringify({ teacher_reply: p.teacher_reply })
            });
            renderMainApp();
        }
    }

    async function deleteForumPost(pid) {
        await supabaseFetch(`/forum_posts?id=eq.${pid}`, { method: 'DELETE' });
        appData.forumPosts = appData.forumPosts.filter(p => p.id !== pid);
        renderMainApp();
    }

    async function addAssignment(title, content, fileBase64, fileName, mask) {
        if ((!title?.trim()) && !fileBase64) return false;
        const finalTitle = (title?.trim()) ? title.trim() : (fileName || "未命名作业");
        const finalContent = (content?.trim()) ? content.trim() : (fileBase64 ? "📎 已提交附件，无文字说明" : "");
        const newAssign = {
            id: Date.now() + "_ass",
            title: finalTitle, content: finalContent,
            file_data_url: fileBase64 || null, file_name: fileName || null,
            teacher_feedback: "", grade: null,
            submitted_at: new Date().toISOString(), student_id_mask: mask
        };
        await supabaseFetch('/assignments', { method: 'POST', body: JSON.stringify(newAssign) });
        appData.assignments.unshift(newAssign);
        renderMainApp();
        return true;
    }

    async function gradeAssignment(aid, grade, fb) {
        const a = appData.assignments.find(a => a.id === aid);
        if (a) {
            let g = null;
            if (grade !== undefined && grade !== "") {
                let parsed = parseInt(grade);
                if (!isNaN(parsed) && parsed >= 0 && parsed <= 100) g = parsed;
            }
            a.grade = g;
            if (fb !== undefined) a.teacher_feedback = fb;
            await supabaseFetch(`/assignments?id=eq.${aid}`, {
                method: 'PATCH',
                body: JSON.stringify({ grade: g, teacher_feedback: fb || "" })
            });
            renderMainApp();
        }
    }

    async function deleteAssignment(aid) {
        await supabaseFetch(`/assignments?id=eq.${aid}`, { method: 'DELETE' });
        appData.assignments = appData.assignments.filter(a => a.id !== aid);
        renderMainApp();
    }

    async function uploadMaterial(fileName, fileDataUrl, fileType) {
        if (!fileName || !fileDataUrl) return false;
        const newMaterial = {
            id: Date.now() + "_mat",
            file_name: fileName, file_data_url: fileDataUrl,
            file_type: fileType, upload_date: new Date().toISOString()
        };
        await supabaseFetch('/course_materials', { method: 'POST', body: JSON.stringify(newMaterial) });
        appData.courseMaterials.unshift(newMaterial);
        renderMainApp();
        return true;
    }

    async function deleteMaterial(materialId) {
        await supabaseFetch(`/course_materials?id=eq.${materialId}`, { method: 'DELETE' });
        appData.courseMaterials = appData.courseMaterials.filter(m => m.id !== materialId);
        renderMainApp();
    }

    // 登录相关
    function changeTeacherPassword(oldPwd, newPwd) {
        if (oldPwd !== "teacher123" || newPwd?.length < 4) return false;
        return true;
    }
    function changeStudentPassword(studentId, oldPwd, newPwd) {
        const s = appData.students.find(s => s.full_id === studentId);
        if (!s || s.password !== oldPwd || newPwd?.length < 4) return false;
        s.password = newPwd;
        return true;
    }

    function showChangePasswordDialog(isTeacher) {
        if (isTeacher) {
            let old = prompt("当前密码:");
            if (!old) return;
            let newp = prompt("新密码(≥4位):");
            if (newp?.length >= 4 && changeTeacherPassword(old, newp)) {
                alert("修改成功！");
            } else alert("原密码错误或过短");
        } else {
            let old = prompt("当前密码:");
            let newp = prompt("新密码(≥4位):");
            if (newp?.length >= 4 && changeStudentPassword(currentUser.fullId, old, newp)) {
                alert("修改成功！");
            } else alert("旧密码错误");
        }
    }

    function showForgotPassword() {
        alert("请联系管理员重置密码（教师密码: teacher123，学生默认密码为学号后四位）");
    }

    function showRegister() {
        const root = document.getElementById('appRoot');
        root.innerHTML = `<div class="register-overlay"><div class="register-card"><h2>学生注册</h2><input id="regFullId" placeholder="学号"><input id="regName" placeholder="姓名"><input type="password" id="regPassword" placeholder="密码(≥4位)"><button id="doRegisterBtn">注册</button><button id="backToLoginFromReg" class="link-btn">返回登录</button><div id="regMsg"></div><div class="demo-note">安全验证默认为学号后四位。</div></div></div>`;
        document.getElementById('doRegisterBtn').addEventListener('click', async () => {
            let id = document.getElementById('regFullId').value.trim();
            let name = document.getElementById('regName').value.trim();
            let pwd = document.getElementById('regPassword').value.trim();
            let res = await registerStudent(id, pwd, name);
            let msgDiv = document.getElementById('regMsg');
            if (res.success) {
                msgDiv.className = 'success-msg';
                msgDiv.innerText = res.msg;
                setTimeout(() => renderLogin(), 1800);
            } else {
                msgDiv.className = 'error-msg';
                msgDiv.innerText = res.msg;
            }
        });
        document.getElementById('backToLoginFromReg').addEventListener('click', () => renderLogin());
    }

    async function renderLogin() {
        const root = document.getElementById('appRoot');
        root.innerHTML = `<div class="login-overlay"><div class="login-card"><h2>公共经济学</h2><input id="loginId" placeholder="学号/工号"><input type="password" id="loginPassword" placeholder="密码"><button id="doLoginBtn">登录</button><button id="registerNowBtn" class="link-btn">✨ 注册学生账号</button><button id="forgotPwdBtn" class="link-btn">忘记密码？</button><div id="loginError"></div><div class="demo-note">教师 3240100000 / teacher123<br>学生示例 3240100001 / 0001<br>✨ 数据已同步到云端，多设备共享！</div></div></div>`;
        document.getElementById('doLoginBtn').addEventListener('click', async () => {
            let uid = document.getElementById('loginId').value.trim();
            let pwd = document.getElementById('loginPassword').value.trim();
            let err = document.getElementById('loginError');
            if (uid === "3240100000" && pwd === "teacher123") {
                currentUser = { role: 'teacher', id: uid };
                renderMainApp();
            } else {
                let s = appData.students.find(s => s.full_id === uid && s.password === pwd);
                if (s) {
                    currentUser = { role: 'student', fullId: s.full_id, maskedId: getMaskedStudentId(s.full_id) };
                    renderMainApp();
                } else err.innerText = "账号或密码错误";
            }
        });
        document.getElementById('forgotPwdBtn').addEventListener('click', showForgotPassword);
        document.getElementById('registerNowBtn').addEventListener('click', showRegister);
    }

    // 渲染函数（与之前类似，保持完整功能）
    async function renderMainApp() {
        if (!currentUser) return renderLogin();
        const isTeacher = currentUser.role === 'teacher';
        const root = document.getElementById('appRoot');
        root.innerHTML = `<div class="main-header"><div class="role-badge">${isTeacher ? '👩‍🏫 教师端 · 公共经济学 (云端版)' : `👩‍🎓 学生端 · ${currentUser.fullId} (${currentUser.maskedId})`}</div><div style="display:flex; gap:12px;"><button id="changePwdBtn" class="change-pwd-btn">🔐 修改密码</button><button id="logoutBtnMain" class="logout-btn">🚪 退出</button></div></div><div class="modules-grid"><div class="card"><div class="card-header"><h3>📖 课程互动</h3></div><div class="card-body" id="interactionPanel"></div></div><div class="card"><div class="card-header"><h3>💬 课后问答</h3></div><div class="card-body" id="forumPanel"></div></div><div class="card"><div class="card-header"><h3>📂 作业提交</h3></div><div class="card-body" id="assignmentPanel"></div></div><div class="card"><div class="card-header"><h3>📑 课件资源</h3></div><div class="card-body" id="materialPanel"></div></div></div>`;
        document.getElementById('logoutBtnMain').addEventListener('click', () => { currentUser = null; renderLogin(); });
        document.getElementById('changePwdBtn').addEventListener('click', () => showChangePasswordDialog(isTeacher));
        
        // 简单渲染各板块（保持功能完整）
        document.getElementById('interactionPanel').innerHTML = `<div class="empty-msg">加载中...</div>`;
        document.getElementById('forumPanel').innerHTML = `<div class="empty-msg">加载中...</div>`;
        document.getElementById('assignmentPanel').innerHTML = `<div class="empty-msg">加载中...</div>`;
        document.getElementById('materialPanel').innerHTML = `<div class="empty-msg">加载中...</div>`;
        
        // 重新加载数据后渲染
        await loadAllData();
        renderInteractionPanel(isTeacher);
        renderForumPanel(isTeacher);
        renderAssignmentPanel(isTeacher);
        renderMaterialPanel(isTeacher);
    }

    function renderInteractionPanel(isTeacher) {
        const container = document.getElementById('interactionPanel'); if (!container) return;
        if (isTeacher) {
            let html = `<div><textarea id="newQuestionText" rows="2" placeholder="发布新问题..."></textarea><select id="questionTypeSelect"><option value="essay">简答题</option><option value="blank">填空题</option></select><input id="blankAnswerInput" placeholder="填空标准答案" style="display:none;"><button id="publishQuestionBtn" style="margin-top:12px;">发布</button></div><div class="item-list">`;
            appData.questions.forEach(q => {
                html += `<div class="qa-item"><div class="question-title">${escapeHtml(q.text)}<button class="delete-q-modern" data-id="${q.id}" style="float:right; background:#e0e8ef; border-radius:30px; padding:2px 12px;">🗑️ 删除</button></div>${(q.answers || []).map(a => `<div class="answer-block">🧑‍🎓 ${a.student_id_mask}: ${escapeHtml(a.content)}</div>`).join('') || '<div class="empty-msg">暂无回答</div>'}</div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
            document.getElementById('questionTypeSelect').addEventListener('change', () => {
                document.getElementById('blankAnswerInput').style.display = document.getElementById('questionTypeSelect').value === 'blank' ? 'block' : 'none';
            });
            document.getElementById('publishQuestionBtn').onclick = () => {
                let txt = document.getElementById('newQuestionText').value;
                let type = document.getElementById('questionTypeSelect').value;
                let blankAns = document.getElementById('blankAnswerInput').value;
                if (txt) addQuestion(txt, type, blankAns);
                else alert("输入问题");
            };
            document.querySelectorAll('.delete-q-modern').forEach(btn => btn.addEventListener('click', () => { if (confirm('删除问题？')) deleteQuestion(btn.dataset.id); }));
        } else {
            let html = `<div class="item-list">`;
            appData.questions.forEach(q => {
                html += `<div class="qa-item"><div class="question-title">${escapeHtml(q.text)}</div><div class="answer-block-list">${(q.answers || []).filter(a => a.student_full_id === currentUser.fullId).map(a => `<div>📝 我的回答: ${escapeHtml(a.content)}</div>`).join('')}</div><textarea id="ans_${q.id}" rows="2" placeholder="你的回答..."></textarea><button class="submitAnsBtn" data-id="${q.id}" style="margin-top:10px;">提交/修改</button></div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
            document.querySelectorAll('.submitAnsBtn').forEach(btn => btn.addEventListener('click', () => {
                let val = document.getElementById(`ans_${btn.dataset.id}`).value;
                if (val) addStudentAnswer(btn.dataset.id, val, currentUser.maskedId, currentUser.fullId);
                else alert("填写回答");
            }));
        }
    }

    function renderForumPanel(isTeacher) {
        const c = document.getElementById('forumPanel'); if (!c) return;
        if (isTeacher) {
            let h = `<div class="item-list">`;
            appData.forumPosts.forEach(p => {
                h += `<div class="forum-item"><b>${escapeHtml(p.title)}</b> <span class="info-meta">(学号:${p.student_id_mask})</span><div>${escapeHtml(p.content)}</div><textarea id="reply_${p.id}" rows="2" placeholder="教师回复...">${escapeHtml(p.teacher_reply || '')}</textarea><button class="saveReplyBtn" data-id="${p.id}" style="margin-top:8px;">💬 回复</button><button class="delete-forum-modern" data-id="${p.id}" style="background:#e0e8ef; margin-left:8px;">🗑️ 删除</button></div>`;
            });
            h += `</div>`;
            c.innerHTML = h;
            document.querySelectorAll('.saveReplyBtn').forEach(btn => btn.addEventListener('click', () => { teacherReplyToForum(btn.dataset.id, document.getElementById(`reply_${btn.dataset.id}`).value); }));
            document.querySelectorAll('.delete-forum-modern').forEach(btn => btn.addEventListener('click', () => { if (confirm('删除该条？')) deleteForumPost(btn.dataset.id); }));
        } else {
            let h = `<div><input id="forumTitle" placeholder="标题"><textarea id="forumContent" rows="2" placeholder="内容"></textarea><select id="forumType"><option value="question">❓ 疑问</option><option value="thanks">🙏 感谢</option></select><button id="postForumBtn">发布</button></div><div class="item-list">`;
            appData.forumPosts.forEach(p => {
                h += `<div class="forum-item"><b>${escapeHtml(p.title)}</b><div>${escapeHtml(p.content)}</div>${p.teacher_reply ? `<div class="teacher-reply">👩‍🏫 教师回复: ${escapeHtml(p.teacher_reply)}</div>` : ''}<div class="info-meta">${new Date(p.submitted_at).toLocaleString()}</div></div>`;
            });
            h += `</div>`;
            c.innerHTML = h;
            document.getElementById('postForumBtn').onclick = () => {
                let type = document.getElementById('forumType').value, title = document.getElementById('forumTitle').value, content = document.getElementById('forumContent').value;
                if (title && content) addForumPost(type, title, content, currentUser.maskedId);
                else alert("完善内容");
            };
        }
    }

    function renderAssignmentPanel(isTeacher) {
        const c = document.getElementById('assignmentPanel'); if (!c) return;
        if (isTeacher) {
            let h = `<div class="item-list">`;
            appData.assignments.forEach(a => {
                h += `<div class="assignment-item"><b>${escapeHtml(a.title)}</b> (${a.student_id_mask})<div>${escapeHtml(a.content)}</div>${a.file_data_url ? `<div class="file-tag">📎 <a href="${a.file_data_url}" download="${escapeHtml(a.file_name)}">${escapeHtml(a.file_name)}</a></div>` : ''}<div class="feedback-area"><input id="grade_${a.id}" placeholder="分数" value="${a.grade ?? ''}" style="width:90px;"><input id="fb_${a.id}" placeholder="评语" value="${escapeHtml(a.teacher_feedback || '')}"><button class="saveGradeBtn" data-id="${a.id}">保存批改</button><button class="delete-ass-modern" data-id="${a.id}" style="background:#e0e8ef; margin-left:6px;">删除</button></div></div>`;
            });
            h += `</div>`;
            c.innerHTML = h;
            document.querySelectorAll('.saveGradeBtn').forEach(btn => btn.addEventListener('click', () => { gradeAssignment(btn.dataset.id, document.getElementById(`grade_${btn.dataset.id}`).value, document.getElementById(`fb_${btn.dataset.id}`).value); }));
            document.querySelectorAll('.delete-ass-modern').forEach(btn => btn.addEventListener('click', () => { if (confirm('删除作业')) deleteAssignment(btn.dataset.id); }));
        } else {
            let h = `<div><input id="assTitle" placeholder="标题(可选)"><textarea id="assContent" rows="2" placeholder="描述(可选)"></textarea><div class="upload-area"><input type="file" id="assFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt"></div><button id="submitAssignmentBtn">📤 提交 (可只传文件)</button></div><div class="item-list" id="myAssignList"></div>`;
            c.innerHTML = h;
            const refreshMy = () => {
                let my = appData.assignments.filter(a => a.student_id_mask === currentUser.maskedId);
                let html = '';
                my.forEach(a => {
                    html += `<div class="assignment-item"><b>${escapeHtml(a.title)}</b><div>${escapeHtml(a.content)}</div>${a.file_data_url ? `<div class="file-tag"><a href="${a.file_data_url}" download>📎 ${escapeHtml(a.file_name)}</a></div>` : ''}${a.grade !== null ? `<div class="teacher-reply">🎯 得分:${a.grade} · ${escapeHtml(a.teacher_feedback || '')}</div>` : (a.teacher_feedback ? `<div>📢 ${escapeHtml(a.teacher_feedback)}</div>` : '')}</div>`;
                });
                document.getElementById('myAssignList').innerHTML = html || '<div class="empty-msg">暂无作业</div>';
            };
            refreshMy();
            document.getElementById('submitAssignmentBtn').addEventListener('click', async () => {
                let title = document.getElementById('assTitle').value;
                let content = document.getElementById('assContent').value;
                let file = document.getElementById('assFile').files[0];
                let b64 = null, fn = null;
                if (file) { fn = file.name; b64 = await readFileAsBase64(file); }
                if (!title?.trim() && !b64) { alert("请至少填写标题或上传文件"); return; }
                await addAssignment(title, content, b64, fn, currentUser.maskedId);
                document.getElementById('assTitle').value = '';
                document.getElementById('assContent').value = '';
                document.getElementById('assFile').value = '';
                refreshMy();
            });
        }
    }

    function renderMaterialPanel(isTeacher) {
        const c = document.getElementById('materialPanel'); if (!c) return;
        if (isTeacher) {
            let html = `<div class="upload-area"><input type="file" id="materialFile" accept=".pdf,.doc,.docx,.ppt,.pptx"><button id="uploadMaterialBtn">📚 上传课件</button></div><div class="item-list" id="materialList"></div>`;
            c.innerHTML = html;
            const refreshMaterials = () => {
                let listDiv = document.getElementById('materialList');
                let h = '';
                appData.courseMaterials.forEach(m => {
                    h += `<div class="resource-item"><div style="display:flex; justify-content:space-between;"><span>📄 ${escapeHtml(m.file_name)}</span><button class="delete-mat-modern" data-id="${m.id}" style="background:#e0e8ef; padding:2px 12px;">删除</button></div><div class="info-meta">上传于 ${new Date(m.upload_date).toLocaleString()}</div>${m.file_data_url ? `<div><a href="${m.file_data_url}" download="${escapeHtml(m.file_name)}">⬇️ 下载课件</a></div>` : '<div class="empty-msg">文件缺失</div>'}</div>`;
                });
                listDiv.innerHTML = h || '<div class="empty-msg">暂无课件</div>';
                document.querySelectorAll('.delete-mat-modern').forEach(btn => btn.addEventListener('click', () => { if (confirm('删除课件?')) deleteMaterial(btn.dataset.id); }));
            };
            document.getElementById('uploadMaterialBtn').addEventListener('click', async () => {
                let fileInput = document.getElementById('materialFile');
                if (!fileInput.files.length) return alert("请选择文件");
                let file = fileInput.files[0];
                let b64 = await readFileAsBase64(file);
                if (await uploadMaterial(file.name, b64, file.name.split('.').pop())) {
                    alert("课件上传成功");
                    refreshMaterials();
                    fileInput.value = '';
                } else alert("上传失败");
            });
            refreshMaterials();
        } else {
            let html = `<div class="item-list" id="studentMaterialList"></div>`;
            c.innerHTML = html;
            let h = '';
            appData.courseMaterials.forEach(m => {
                h += `<div class="resource-item"><div>📘 ${escapeHtml(m.file_name)}</div><div class="info-meta">${new Date(m.upload_date).toLocaleString()}</div>${m.file_data_url ? `<div style="margin-top:8px;"><a href="${m.file_data_url}" download="${escapeHtml(m.file_name)}">📥 下载课件</a> <button class="preview-material" data-url="${m.file_data_url}" data-name="${escapeHtml(m.file_name)}" style="margin-left:12px;">👁️ 在线预览</button></div>` : '<div class="empty-msg">文件缺失</div>'}</div>`;
            });
            document.getElementById('studentMaterialList').innerHTML = h || '<div class="empty-msg">暂无课件</div>';
            document.querySelectorAll('.preview-material').forEach(btn => btn.addEventListener('click', () => { let url = btn.dataset.url; window.open(url, '_blank'); }));
        }
    }

    // 启动应用
    (async function init() {
        await loadAllData();
        renderLogin();
    })();
</script>
</body>
</html>
